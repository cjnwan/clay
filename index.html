<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<title>捏黏土</title>
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
	<style>

		* { margin: 0; padding: 0; box-sizing: border-box; }

		html, body { height: 100%; touch-action: none; }

		body {
			overflow: hidden;
			background: #efe0c8;
			font-family: ui-rounded, "PingFang SC", "Hiragino Sans GB", system-ui, sans-serif;
			user-select: none;
			-webkit-user-select: none;
			-webkit-touch-callout: none;
			overscroll-behavior: none;
		}

		canvas { display: block; touch-action: none; }

		#title {
			position: fixed;
			top: max(16px, env(safe-area-inset-top));
			left: 22px;
			font-size: 30px;
			font-weight: 800;
			color: #7a5a36;
			letter-spacing: 3px;
			transform: rotate(-2deg);
			text-shadow: 0 2px 0 #ffffff88;
			pointer-events: none;
		}

		#title small {
			display: block;
			font-size: 11px;
			font-weight: 500;
			letter-spacing: 1px;
			opacity: 0.6;
		}

		#hint {
			position: fixed;
			bottom: 148px;
			width: 100%;
			padding: 0 16px;
			text-align: center;
			color: #8a6a44;
			font-size: 14px;
			opacity: 0.85;
			pointer-events: none;
		}

		#palette, #workshopBar {
			position: fixed;
			bottom: max(16px, env(safe-area-inset-bottom));
			left: 0;
			width: 100vw;
			display: flex;
			flex-direction: column;
			gap: 7px;
			align-items: center;
			padding: 0 8px;
		}

		#palette.hidden, #workshopBar.hidden { display: none; }

		.prow {
			display: flex;
			justify-content: center;
			flex-wrap: wrap;
			gap: clamp(3px, 0.5vw, 10px);
			max-width: 100vw;
		}

		#colorRow button, #wsColorRow button { width: clamp(24px, 4.3vw, 44px); box-shadow: 0 4px 10px #00000033, inset 0 -6px 8px #00000022, inset 0 0 0 1.5px #00000018; }

		#palette button, #workshopBar button {
			width: clamp(25px, 4.9vw, 54px);
			height: auto;
			aspect-ratio: 1 / 1;
			border-radius: 50%;
			border: 4px solid #fff;
			background: #fff;
			box-shadow: 0 4px 10px #00000033, inset 0 -6px 8px #00000022;
			font-size: clamp(18px, 4.5vw, 26px);
			line-height: 1;
			cursor: pointer;
			touch-action: none;
			transition: transform 0.15s;
		}

		#palette button, #workshopBar button { transform: rotate(var(--rot, 0deg)); }

		#palette button svg, #workshopBar button svg {
			width: 78%;
			height: 78%;
			display: block;
			margin: auto;
			pointer-events: none;
		}

		#palette button.selected, #workshopBar button.selected {
			transform: rotate(var(--rot, 0deg)) scale(1.2);
			box-shadow: 0 6px 14px #00000044, 0 0 0 4px #ffffffaa, inset 0 -6px 8px #00000022;
		}

		#palette button:active, #workshopBar button:active { transform: rotate(var(--rot, 0deg)) scale(0.92); }

		#clearBtn.holding { animation: holdfill 0.7s linear forwards; }

		#demoBtn.armed { animation: armedpulse 0.6s ease-in-out infinite alternate; }

		@keyframes armedpulse {
			to { transform: scale(1.22); box-shadow: 0 0 0 5px #f6d155cc, 0 6px 14px #00000044; }
		}

		@keyframes holdfill {
			to { transform: scale(1.28); background: #f6d155; box-shadow: 0 0 0 6px #ffffffaa, 0 6px 14px #00000044; }
		}

		@media (pointer: coarse) {
			#palette button { width: clamp(28px, 4.9vw, 58px); }
			#hint { bottom: 160px; }
		}

		@media (max-width: 640px) {
			#hint { bottom: 190px; }
		}

		/* 工坊条有三行，提示文字上移别被挡住 */
		body.ws #hint { bottom: 224px; }

		#palette.shake { animation: shake 0.3s; }

		@keyframes shake {
			25% { transform: translateX(-5px); }
			75% { transform: translateX(5px); }
		}

		/* 贴件放好后的确认气泡：✓ 贴好 / ↺ 放回 */
		#confirmBar {
			position: fixed;
			display: flex;
			gap: 14px;
			transform: translateX(-50%);
			z-index: 5;
		}

		#confirmBar.hidden { display: none; }

		#confirmBar button {
			width: 56px;
			height: 56px;
			border-radius: 50%;
			border: 4px solid #fff;
			background: #fff;
			box-shadow: 0 4px 10px #00000033, inset 0 -6px 8px #00000022;
			cursor: pointer;
			touch-action: none;
		}

		#confirmBar button svg {
			width: 78%;
			height: 78%;
			display: block;
			margin: auto;
			pointer-events: none;
		}

		#confirmYes { animation: confirmpulse 0.7s ease-in-out infinite alternate; }

		@keyframes confirmpulse {
			to { transform: scale(1.12); box-shadow: 0 0 0 5px #a8cf94aa, 0 6px 14px #00000044; }
		}

		#loading {
			position: fixed;
			inset: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #efe0c8;
			color: #7a5a36;
			font-size: 22px;
			z-index: 10;
			transition: opacity 0.5s;
		}

		#loading.hidden { opacity: 0; pointer-events: none; }

	</style>
</head>
<body>

	<div id="loading">🥣 和泥中…</div>

	<div id="title">捏黏土<small>three.js + box3d.js</small></div>
	<div id="hint">点颜色加黏土 · 拖动搬家 · 靠近黏住 · 按住变形 · 拖住时：加一指捏合缩放旋转 · 🤸 翻跟头 · 双击拆开 · 拖出盘外收走 · ● 大小 · 🐍 小蛇 · 👀👄🎩 装饰 · 🤏✂️🖌 工具 · 🧸 手办工坊 · 🎬 表演 · 🎥 拍短片 · 🧹 按住清空 · 网址就是分享链接</div>

	<div id="palette">
		<div class="prow" id="colorRow"></div>
		<div class="prow" id="toolRow">
		<button id="sizeBtn" title="大小"><svg viewBox="0 0 44 44"><circle cx="22" cy="23" r="10" fill="#b98a5a" stroke="#6b4a2b" stroke-width="3"/><circle cx="18.5" cy="19" r="2.6" fill="#e8cfa8" opacity="0.85"/></svg></button>
		<button id="chainBtn" title="软软小蛇"><svg viewBox="0 0 44 44"><path d="M6,29 C11,17 17,17 21,25 C25,33 30,33 35,25" fill="none" stroke="#5e9a48" stroke-width="7" stroke-linecap="round"/><circle cx="35" cy="23" r="5.5" fill="#6fb055" stroke="#4a7d38" stroke-width="2"/><circle cx="37" cy="21.5" r="1.5" fill="#2f2620"/><path d="M40,25 l4,2 m-4,-1 l3,3" stroke="#c94f43" stroke-width="1.8" stroke-linecap="round"/></svg></button>
		<button id="eyeBtn" title="眼睛"><svg viewBox="0 0 44 44"><circle cx="22" cy="22" r="13" fill="#ffffff" stroke="#6b4a2b" stroke-width="3"/><circle cx="25.5" cy="24" r="5.5" fill="#2f2620"/><circle cx="23.5" cy="21.5" r="1.8" fill="#ffffff"/></svg></button>
		<button id="mouthBtn" title="嘴巴"><svg viewBox="0 0 44 44"><path d="M8,18 Q22,38 36,18 Q29,25 22,25 Q15,25 8,18 Z" fill="#c94f43" stroke="#8c3428" stroke-width="2.6" stroke-linejoin="round"/><path d="M15,26.5 Q22,31 29,26.5" fill="none" stroke="#8c3428" stroke-width="2" stroke-linecap="round"/></svg></button>
		<button id="hatBtn" title="帽子"><svg viewBox="0 0 44 44"><path d="M22,7 Q26,16 32,29 L12,29 Q18,16 22,7 Z" fill="#e0584b" stroke="#a53d33" stroke-width="2.6" stroke-linejoin="round"/><ellipse cx="22" cy="30" rx="14" ry="4.5" fill="#f0b64e" stroke="#b9822e" stroke-width="2.4"/><circle cx="22" cy="7" r="4" fill="#f0b64e" stroke="#b9822e" stroke-width="2.2"/></svg></button>
		<button id="bowBtn" title="蝴蝶结"><svg viewBox="0 0 44 44"><path d="M20,22 L6,13 Q3,20 6,31 L20,22 Z" fill="#c9364a" stroke="#8c2436" stroke-width="2.2" stroke-linejoin="round"/><path d="M24,22 L38,13 Q41,20 38,31 L24,22 Z" fill="#c9364a" stroke="#8c2436" stroke-width="2.2" stroke-linejoin="round"/><circle cx="22" cy="22" r="4.5" fill="#e0584b" stroke="#8c2436" stroke-width="2.2"/></svg></button>
		<button id="flipBtn" title="翻跟头（拖住时点）"><svg viewBox="0 0 44 44"><path d="M11,29 A12.5,12.5 0 1 1 30,31" fill="none" stroke="#6b4a2b" stroke-width="4" stroke-linecap="round"/><path d="M33,25 L31,36 L23,29 Z" fill="#6b4a2b"/><circle cx="14" cy="35" r="4.5" fill="#7dbbe0" stroke="#4a7da5" stroke-width="2.2"/></svg></button>
		<button id="cutBtn" title="剪刀：点一下剪成两半"><svg viewBox="0 0 44 44"><path d="M10,8 L30,32" stroke="#8a9aa8" stroke-width="3.6" stroke-linecap="round"/><path d="M30,8 L10,32" stroke="#b8c4cc" stroke-width="3.6" stroke-linecap="round"/><circle cx="8" cy="36" r="4.5" fill="none" stroke="#c94f43" stroke-width="3"/><circle cx="32" cy="36" r="4.5" fill="none" stroke="#c94f43" stroke-width="3"/><circle cx="20" cy="20" r="2" fill="#6b4a2b"/></svg></button>
		<button id="paintBtn" title="上色：选个颜色点一点"><svg viewBox="0 0 44 44"><path d="M30,6 L14,26" stroke="#8a5a33" stroke-width="4.2" stroke-linecap="round"/><path d="M14,26 Q8,28 7,35 Q13,36 16,31 Q18,28 14,26 Z" fill="#e8a878" stroke="#b97a4e" stroke-width="2"/><circle cx="33" cy="10" r="4" fill="#e0584b" opacity="0.9"/><circle cx="27" cy="35" r="3" fill="#53a7dd" opacity="0.9"/><circle cx="37" cy="24" r="2.6" fill="#7dbb5f" opacity="0.9"/></svg></button>
		<button id="kneadBtn" title="捏一捏"><svg viewBox="0 0 44 44"><path d="M6,13 Q20,6 31,15" fill="none" stroke="#e8a878" stroke-width="6" stroke-linecap="round"/><path d="M6,32 Q20,38 31,27" fill="none" stroke="#e8a878" stroke-width="6" stroke-linecap="round"/><circle cx="35.5" cy="21" r="5" fill="#c94f43" stroke="#8c3428" stroke-width="2.2"/></svg></button>
		<button id="wsBtn" title="手办工坊：捏一只穿玩偶服的小家伙"><svg viewBox="0 0 44 44"><circle cx="22" cy="15" r="9" fill="#e8b28a" stroke="#a06b43" stroke-width="2.6"/><path d="M13,38 Q13,25 22,25 Q31,25 31,38 Z" fill="#7dbb5f" stroke="#4a7d38" stroke-width="2.6" stroke-linejoin="round"/><circle cx="19" cy="14.5" r="1.6" fill="#2f2620"/><circle cx="25.5" cy="15" r="1.6" fill="#2f2620"/><path d="M14,9 Q17,4 21,7 M30,9 Q27,4 23,7" fill="none" stroke="#4a7d38" stroke-width="3.4" stroke-linecap="round"/></svg></button>
		<button id="demoBtn" title="看表演：游戏当面捏给你看"><svg viewBox="0 0 44 44"><g transform="rotate(-14 12 14)"><rect x="5" y="9" width="30" height="8" rx="2" fill="#3a3430"/><path d="M9,9 l4,8 M16,9 l4,8 M23,9 l4,8 M30,9 l4,8" stroke="#f4eee3" stroke-width="2.4"/></g><rect x="6" y="18" width="30" height="17" rx="3" fill="#3a3430" stroke="#211d1a" stroke-width="1.6"/><path d="M17,22 L27,26.5 L17,31 Z" fill="#f6d155"/></svg></button>
		<button id="clipBtn" title="给作品拍一段环绕短片"><svg viewBox="0 0 44 44"><rect x="5" y="14" width="24" height="17" rx="4.5" fill="#8a9aa8" stroke="#5d6b77" stroke-width="2.4"/><path d="M29,20 L39,15 L39,30 L29,25 Z" fill="#5d6b77"/><circle cx="17" cy="22.5" r="5.5" fill="#dbe4ea" stroke="#5d6b77" stroke-width="2"/><circle cx="9" cy="10" r="3.4" fill="#e0584b"/></svg></button>
		<button id="clearBtn" title="收拾干净（按住）"><svg viewBox="0 0 44 44"><path d="M29,5 L20,22" stroke="#8a5a33" stroke-width="4.2" stroke-linecap="round"/><path d="M20,22 L10,37 M21.5,23.5 L16,38 M23,24 L22,39 M24.5,23.5 L28,37" stroke="#d9a75a" stroke-width="3.4" stroke-linecap="round"/><path d="M17.5,20 L26,24" stroke="#b9822e" stroke-width="3.6" stroke-linecap="round"/></svg></button>
		</div>
	</div>

	<!-- 手办工坊的工具条：进工坊时替换调色盘 -->
	<div id="workshopBar" class="hidden">
		<div class="prow" id="wsColorRow"></div>
		<div class="prow" id="wsPartRow">
			<button data-part="hood" title="玩偶服头套：一键穿上，露出小脸"><svg viewBox="0 0 44 44"><path d="M22,5 Q36,5 36,20 Q36,37 22,37 Q8,37 8,20 Q8,5 22,5 Z" fill="#7dbb5f" stroke="#4a7d38" stroke-width="2.6"/><circle cx="22" cy="21" r="9.5" fill="#e8b28a" stroke="#4a7d38" stroke-width="3"/><path d="M11,7 Q8,1 15,3 M33,7 Q36,1 29,3" fill="none" stroke="#4a7d38" stroke-width="3" stroke-linecap="round"/></svg></button>
			<button data-part="eye" title="眼睛（自动长一对）"><svg viewBox="0 0 44 44"><circle cx="22" cy="22" r="12" fill="#ffffff" stroke="#6b4a2b" stroke-width="2.8"/><circle cx="24" cy="23.5" r="5.5" fill="#2f2620"/><circle cx="22.5" cy="21" r="1.8" fill="#ffffff"/></svg></button>
			<button data-part="mouth" title="小嘴巴"><svg viewBox="0 0 44 44"><path d="M8,18 Q14,28 22,20 Q30,28 36,18" fill="none" stroke="#5a4030" stroke-width="4.4" stroke-linecap="round"/></svg></button>
			<button data-part="dot" title="小圆点：鼻孔、扣子、斑点"><svg viewBox="0 0 44 44"><circle cx="15" cy="17" r="4.5" fill="#9c6b4a"/><circle cx="29" cy="15" r="3.5" fill="#e0584b"/><circle cx="22" cy="30" r="4" fill="#3a3430"/></svg></button>
			<button data-part="ear" title="耳朵（自动长一对）"><svg viewBox="0 0 44 44"><ellipse cx="15" cy="18" rx="8" ry="10" fill="#e8b28a" stroke="#a06b43" stroke-width="2.6" transform="rotate(-14 15 18)"/><ellipse cx="15" cy="19" rx="4" ry="5.5" fill="#f2a7c4" transform="rotate(-14 15 19)"/><path d="M24,34 Q30,26 38,28" fill="none" stroke="#a06b43" stroke-width="3" stroke-linecap="round" stroke-dasharray="1 5"/></svg></button>
			<button data-part="arm" title="小手（自动长一对）"><svg viewBox="0 0 44 44"><path d="M8,22 Q20,14 33,20" fill="none" stroke="#e8b28a" stroke-width="9" stroke-linecap="round"/><circle cx="34" cy="20.5" r="6" fill="#e8b28a" stroke="#a06b43" stroke-width="2.4"/></svg></button>
			<button data-part="patch" title="色片：压一小块彩泥上去"><svg viewBox="0 0 44 44"><ellipse cx="22" cy="23" rx="13" ry="10" fill="#f2e0c2" stroke="#c4ad8a" stroke-width="2.6"/><ellipse cx="18" cy="20" rx="4" ry="2.6" fill="#ffffff" opacity="0.7"/></svg></button>
		</div>
		<div class="prow">
			<button id="wsBackBtn" title="回到黏土板"><svg viewBox="0 0 44 44"><path d="M26,10 L12,22 L26,34" fill="none" stroke="#6b4a2b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><ellipse cx="31" cy="22" rx="6" ry="9" fill="#d9a75a" stroke="#b9822e" stroke-width="2.4"/></svg></button>
			<button id="wsBodyBtn" title="换个身体"><svg viewBox="0 0 44 44"><circle cx="13" cy="14" r="7" fill="#f2a7c4" stroke="#b26e8d" stroke-width="2.4"/><path d="M6,36 Q6,25 13,25 Q20,25 20,36 Z" fill="#f2a7c4" stroke="#b26e8d" stroke-width="2.4" stroke-linejoin="round"/><circle cx="32" cy="12" r="5.5" fill="#7dbbe0" stroke="#4a7da5" stroke-width="2.4"/><path d="M26,36 Q26,20 32,20 Q38,20 38,36 Z" fill="#7dbbe0" stroke="#4a7da5" stroke-width="2.4" stroke-linejoin="round"/></svg></button>
			<button id="wsTurnBtn" title="转一转"><svg viewBox="0 0 44 44"><ellipse cx="22" cy="24" rx="14" ry="6.5" fill="none" stroke="#6b4a2b" stroke-width="3.6" stroke-dasharray="5 4"/><path d="M36,20 L38,27 L30,25 Z" fill="#6b4a2b"/><circle cx="22" cy="16" r="6.5" fill="#b98a5a" stroke="#6b4a2b" stroke-width="2.6"/></svg></button>
			<button id="wsDoneBtn" title="完成！带它回黏土板一起玩"><svg viewBox="0 0 44 44"><ellipse cx="22" cy="33" rx="16" ry="6" fill="#d9b98a" stroke="#b9822e" stroke-width="2.4"/><circle cx="22" cy="14" r="6.5" fill="#7dbb5f" stroke="#4a7d38" stroke-width="2.4"/><path d="M16,31 Q16,21 22,21 Q28,21 28,31 Z" fill="#7dbb5f" stroke="#4a7d38" stroke-width="2.4" stroke-linejoin="round"/><path d="M30,8 L34,13 L41,4" fill="none" stroke="#5f9e4c" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
		</div>
	</div>

	<div id="confirmBar" class="hidden">
		<button id="confirmNo" title="放回去"><svg viewBox="0 0 44 44"><path d="M29,11 A11,11 0 1 0 33,26" fill="none" stroke="#9c8b76" stroke-width="4.4" stroke-linecap="round"/><path d="M24,6 L30,11.5 L23,16" fill="none" stroke="#9c8b76" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
		<button id="confirmYes" title="贴好啦"><svg viewBox="0 0 44 44"><path d="M9,24 L18,33 L35,12" fill="none" stroke="#5f9e4c" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
	</div>

	<!-- 依赖已 vendor 到本地（three@0.185.1、box3d.js@0.0.2），不依赖任何 CDN -->
	<script type="importmap">
		{
			"imports": {
				"three": "./vendor/three.module.js",
				"three/addons/": "./vendor/addons/",
				"box3d.js/inline": "./vendor/box3d.inline.mjs"
			}
		}
	</script>

	<script type="module" src="main.js"></script>

</body>
</html>
