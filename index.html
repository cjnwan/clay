<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<title>捏黏土</title>
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
	<style>

		* { margin: 0; padding: 0; box-sizing: border-box; }

		html, body { height: 100%; touch-action: none; }

		body {
			overflow: hidden;
			background: #efe0c8;
			font-family: ui-rounded, "PingFang SC", "Hiragino Sans GB", system-ui, sans-serif;
			user-select: none;
			-webkit-user-select: none;
			-webkit-touch-callout: none;
			overscroll-behavior: none;
		}

		canvas { display: block; touch-action: none; }

		#title {
			position: fixed;
			top: max(16px, env(safe-area-inset-top));
			left: 22px;
			font-size: 30px;
			font-weight: 800;
			color: #7a5a36;
			letter-spacing: 3px;
			transform: rotate(-2deg);
			text-shadow: 0 2px 0 #ffffff88;
			pointer-events: none;
		}

		#title small {
			display: block;
			font-size: 11px;
			font-weight: 500;
			letter-spacing: 1px;
			opacity: 0.6;
		}

		#hint {
			position: fixed;
			bottom: 104px;
			width: 100%;
			padding: 0 16px;
			text-align: center;
			color: #8a6a44;
			font-size: 14px;
			opacity: 0.85;
			pointer-events: none;
		}

		#palette {
			position: fixed;
			bottom: max(20px, env(safe-area-inset-bottom));
			left: 50%;
			transform: translateX(-50%);
			display: flex;
			justify-content: center;
			gap: clamp(4px, 0.9vw, 12px);
			align-items: center;
			max-width: 100vw;
			padding: 0 8px;
		}

		#palette button {
			width: clamp(32px, 7.2vw, 54px);
			height: auto;
			aspect-ratio: 1 / 1;
			border-radius: 50%;
			border: 4px solid #fff;
			background: #fff;
			box-shadow: 0 4px 10px #00000033, inset 0 -6px 8px #00000022;
			font-size: clamp(18px, 4.5vw, 26px);
			line-height: 1;
			cursor: pointer;
			touch-action: none;
			transition: transform 0.15s;
		}

		#palette button.selected {
			transform: scale(1.2);
			box-shadow: 0 6px 14px #00000044, 0 0 0 4px #ffffffaa, inset 0 -6px 8px #00000022;
		}

		#palette button:active { transform: scale(0.92); }

		#clearBtn.holding { animation: holdfill 0.7s linear forwards; }

		@keyframes holdfill {
			to { transform: scale(1.28); background: #f6d155; box-shadow: 0 0 0 6px #ffffffaa, 0 6px 14px #00000044; }
		}

		@media (pointer: coarse) {
			#palette button { width: clamp(38px, 7.2vw, 58px); }
			#hint { bottom: 116px; }
		}

		/* 窄屏放不下 11 个按钮时折成两排（6 色一排、5 个工具一排） */
		@media (max-width: 640px) {
			#palette { flex-wrap: wrap; max-width: 390px; }
			#hint { bottom: 172px; }
		}

		#palette.shake { animation: shake 0.3s; }

		@keyframes shake {
			25% { transform: translateX(-50%) translateX(-5px); }
			75% { transform: translateX(-50%) translateX(5px); }
		}

		#loading {
			position: fixed;
			inset: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #efe0c8;
			color: #7a5a36;
			font-size: 22px;
			z-index: 10;
			transition: opacity 0.5s;
		}

		#loading.hidden { opacity: 0; pointer-events: none; }

	</style>
</head>
<body>

	<div id="loading">🥣 和泥中…</div>

	<div id="title">捏黏土<small>three.js + box3d.js</small></div>
	<div id="hint">点颜色加黏土 · 拖动搬家 · 慢慢靠近黏住 · 按住变形 · 双击拆开 · 👀👄🎩 贴装饰 · 🤏 捏一捏 · 🎬 看表演 · 🧹 按住清空</div>

	<div id="palette">
		<button id="eyeBtn" title="眼睛">👀</button>
		<button id="mouthBtn" title="嘴巴">👄</button>
		<button id="hatBtn" title="帽子">🎩</button>
		<button id="kneadBtn" title="捏一捏">🤏</button>
		<button id="demoBtn" title="看表演">🎬</button>
		<button id="clearBtn" title="收拾干净（按住）">🧹</button>
	</div>

	<!-- 依赖已 vendor 到本地（three@0.185.1、box3d.js@0.0.2），不依赖任何 CDN -->
	<script type="importmap">
		{
			"imports": {
				"three": "./vendor/three.module.js",
				"three/addons/": "./vendor/addons/",
				"box3d.js/inline": "./vendor/box3d.inline.mjs"
			}
		}
	</script>

	<script type="module" src="main.js"></script>

</body>
</html>
