<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<title>捏黏土</title>
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
	<style>

		* { margin: 0; padding: 0; box-sizing: border-box; }

		html, body { height: 100%; touch-action: none; }

		body {
			overflow: hidden;
			background: #efe0c8;
			font-family: ui-rounded, "PingFang SC", "Hiragino Sans GB", system-ui, sans-serif;
			user-select: none;
			-webkit-user-select: none;
			-webkit-touch-callout: none;
			overscroll-behavior: none;
		}

		canvas { display: block; touch-action: none; }

		#title {
			position: fixed;
			top: max(16px, env(safe-area-inset-top));
			left: 22px;
			font-size: 30px;
			font-weight: 800;
			color: #7a5a36;
			letter-spacing: 3px;
			transform: rotate(-2deg);
			text-shadow: 0 2px 0 #ffffff88;
			pointer-events: none;
		}

		#title small {
			display: block;
			font-size: 11px;
			font-weight: 500;
			letter-spacing: 1px;
			opacity: 0.6;
		}

		#hint {
			position: fixed;
			bottom: 148px;
			width: 100%;
			padding: 0 16px;
			text-align: center;
			color: #8a6a44;
			font-size: 14px;
			opacity: 0.85;
			pointer-events: none;
		}

		#palette, #workshopBar {
			position: fixed;
			bottom: max(16px, env(safe-area-inset-bottom));
			left: 0;
			width: 100vw;
			display: flex;
			flex-direction: column;
			gap: 7px;
			align-items: center;
			padding: 0 8px;
		}

		#palette.hidden, #workshopBar.hidden { display: none; }

		.prow {
			display: flex;
			justify-content: center;
			flex-wrap: wrap;
			gap: clamp(3px, 0.5vw, 10px);
			max-width: 100vw;
		}

		#colorRow button, #wsColorRow button { width: clamp(24px, 4.3vw, 44px); box-shadow: 0 4px 10px #00000033, inset 0 -6px 8px #00000022, inset 0 0 0 1.5px #00000018; }

		#palette button, #workshopBar button {
			width: clamp(25px, 4.9vw, 54px);
			height: auto;
			aspect-ratio: 1 / 1;
			border-radius: 50%;
			border: 4px solid #fff;
			background: #fff;
			box-shadow: 0 4px 10px #00000033, inset 0 -6px 8px #00000022;
			font-size: clamp(18px, 4.5vw, 26px);
			line-height: 1;
			cursor: pointer;
			touch-action: none;
			transition: transform 0.15s;
		}

		#palette button, #workshopBar button { transform: rotate(var(--rot, 0deg)); }

		#palette button svg, #workshopBar button svg {
			width: 78%;
			height: 78%;
			display: block;
			margin: auto;
			pointer-events: none;
		}

		#palette button.selected, #workshopBar button.selected {
			transform: rotate(var(--rot, 0deg)) scale(1.2);
			box-shadow: 0 6px 14px #00000044, 0 0 0 4px #ffffffaa, inset 0 -6px 8px #00000022;
		}

		#palette button:active, #workshopBar button:active { transform: rotate(var(--rot, 0deg)) scale(0.92); }

		#clearBtn.holding { animation: holdfill 0.7s linear forwards; }

		#demoBtn.armed { animation: armedpulse 0.6s ease-in-out infinite alternate; }

		@keyframes armedpulse {
			to { transform: scale(1.22); box-shadow: 0 0 0 5px #f6d155cc, 0 6px 14px #00000044; }
		}

		@keyframes holdfill {
			to { transform: scale(1.28); background: #f6d155; box-shadow: 0 0 0 6px #ffffffaa, 0 6px 14px #00000044; }
		}

		@media (pointer: coarse) {
			#palette button { width: clamp(28px, 4.9vw, 58px); }
			#hint { bottom: 160px; }
		}

		@media (max-width: 640px) {
			#hint { bottom: 190px; }
		}

		/* 工坊条有三行，提示文字上移别被挡住 */
		body.ws #hint { bottom: 224px; }

		/* 工坊 tab：R2 内容行随 data-tab 切换；主题色 = 模式（形状蓝/雕刻橙/装扮粉） */
		#workshopBar .wsrow { display: none; border-radius: 20px; padding: 5px 10px; }
		#workshopBar[data-tab="shape"] #wsShapeRow { display: flex; background: #7dbbe022; }
		#workshopBar[data-tab="sculpt"] #wsSculptRow { display: flex; background: #e8a05c2c; }
		#workshopBar[data-tab="deco"] #wsPartRow { display: flex; background: #f2a7c42a; }
		#workshopBar[data-tab="sculpt"] #wsColorRow { opacity: 0.45; }

		/* 内容行按钮多了横向滑动翻页，不加行（形状行 12 个、部件行 14 个） */
		#wsShapeRow, #wsPartRow {
			flex-wrap: nowrap;
			overflow-x: auto;
			justify-content: flex-start;
			-webkit-overflow-scrolling: touch;
			scrollbar-width: none;
			max-width: min(96vw, 640px);
		}

		#wsShapeRow::-webkit-scrollbar, #wsPartRow::-webkit-scrollbar { display: none; }

		#wsShapeRow button, #wsPartRow button { flex: 0 0 auto; }

		/* R0 块架：chip = 块的实时缩略图；长按收走时复用 holdfill 填充动画 */
		#wsChipRow button.chip {
			background-color: #fff;
			background-size: cover;
			background-position: center;
			animation: chipin 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
		}

		@keyframes chipin {
			from { transform: rotate(var(--rot, 0deg)) scale(0.2); }
		}

		#wsChipRow button.holding { animation: holdfill 0.7s linear forwards; }

		/* 分段 tab 控件：相连胶囊，和圆形动作钮长得明显不同 */
		#wsTabs {
			display: flex;
			background: #ffffff;
			border-radius: 999px;
			padding: 3px;
			box-shadow: 0 4px 10px #00000033, inset 0 -4px 6px #00000014;
			gap: 2px;
		}

		#workshopBar #wsTabs button {
			border: none;
			border-radius: 999px;
			background: transparent;
			box-shadow: none;
			transform: none;
			width: clamp(34px, 6vw, 56px);
		}

		#workshopBar #wsTabs button.selected { transform: none; }
		#workshopBar[data-tab="shape"] #wsTabs button[data-tab="shape"] { background: #7dbbe055; box-shadow: inset 0 2px 4px #4a7da533; }
		#workshopBar[data-tab="sculpt"] #wsTabs button[data-tab="sculpt"] { background: #e8a05c55; box-shadow: inset 0 2px 4px #b06f3333; }
		#workshopBar[data-tab="deco"] #wsTabs button[data-tab="deco"] { background: #f2a7c455; box-shadow: inset 0 2px 4px #b26e8d33; }

		#palette.shake { animation: shake 0.3s; }

		@keyframes shake {
			25% { transform: translateX(-5px); }
			75% { transform: translateX(5px); }
		}

		/* 贴件放好后的确认气泡：✓ 贴好 / ↺ 放回 */
		#confirmBar {
			position: fixed;
			display: flex;
			gap: 14px;
			transform: translateX(-50%);
			z-index: 5;
		}

		#confirmBar.hidden { display: none; }

		#confirmBar button {
			width: 56px;
			height: 56px;
			border-radius: 50%;
			border: 4px solid #fff;
			background: #fff;
			box-shadow: 0 4px 10px #00000033, inset 0 -6px 8px #00000022;
			cursor: pointer;
			touch-action: none;
		}

		#confirmBar button svg {
			width: 78%;
			height: 78%;
			display: block;
			margin: auto;
			pointer-events: none;
		}

		#confirmYes { animation: confirmpulse 0.7s ease-in-out infinite alternate; }

		@keyframes confirmpulse {
			to { transform: scale(1.12); box-shadow: 0 0 0 5px #a8cf94aa, 0 6px 14px #00000044; }
		}

		#loading {
			position: fixed;
			inset: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #efe0c8;
			color: #7a5a36;
			font-size: 22px;
			z-index: 10;
			transition: opacity 0.5s;
		}

		#loading.hidden { opacity: 0; pointer-events: none; }

	</style>
</head>
<body>

	<div id="loading">🥣 和泥中…</div>

	<div id="title">捏黏土<small>three.js + box3d.js</small></div>
	<div id="hint">点颜色加黏土 · 拖动搬家 · 靠近黏住 · 按住变形 · 拖住时：加一指捏合缩放旋转 · 🤸 翻跟头 · 双击拆开 · 拖出盘外收走 · ● 大小 · 🐍 小蛇 · 👀👄🎩 装饰 · 🤏✂️🖌 工具 · 🧸 手办工坊 · 🎬 表演 · 🎥 拍短片 · 🧹 按住清空 · 网址就是分享链接</div>

	<div id="palette">
		<div class="prow" id="colorRow"></div>
		<div class="prow" id="toolRow">
		<button id="sizeBtn" title="大小"><svg viewBox="0 0 44 44"><circle cx="22" cy="23" r="10" fill="#b98a5a" stroke="#6b4a2b" stroke-width="3"/><circle cx="18.5" cy="19" r="2.6" fill="#e8cfa8" opacity="0.85"/></svg></button>
		<button id="chainBtn" title="软软小蛇"><svg viewBox="0 0 44 44"><path d="M6,29 C11,17 17,17 21,25 C25,33 30,33 35,25" fill="none" stroke="#5e9a48" stroke-width="7" stroke-linecap="round"/><circle cx="35" cy="23" r="5.5" fill="#6fb055" stroke="#4a7d38" stroke-width="2"/><circle cx="37" cy="21.5" r="1.5" fill="#2f2620"/><path d="M40,25 l4,2 m-4,-1 l3,3" stroke="#c94f43" stroke-width="1.8" stroke-linecap="round"/></svg></button>
		<button id="eyeBtn" title="眼睛"><svg viewBox="0 0 44 44"><circle cx="22" cy="22" r="13" fill="#ffffff" stroke="#6b4a2b" stroke-width="3"/><circle cx="25.5" cy="24" r="5.5" fill="#2f2620"/><circle cx="23.5" cy="21.5" r="1.8" fill="#ffffff"/></svg></button>
		<button id="mouthBtn" title="嘴巴"><svg viewBox="0 0 44 44"><path d="M8,18 Q22,38 36,18 Q29,25 22,25 Q15,25 8,18 Z" fill="#c94f43" stroke="#8c3428" stroke-width="2.6" stroke-linejoin="round"/><path d="M15,26.5 Q22,31 29,26.5" fill="none" stroke="#8c3428" stroke-width="2" stroke-linecap="round"/></svg></button>
		<button id="hatBtn" title="帽子"><svg viewBox="0 0 44 44"><path d="M22,7 Q26,16 32,29 L12,29 Q18,16 22,7 Z" fill="#e0584b" stroke="#a53d33" stroke-width="2.6" stroke-linejoin="round"/><ellipse cx="22" cy="30" rx="14" ry="4.5" fill="#f0b64e" stroke="#b9822e" stroke-width="2.4"/><circle cx="22" cy="7" r="4" fill="#f0b64e" stroke="#b9822e" stroke-width="2.2"/></svg></button>
		<button id="bowBtn" title="蝴蝶结"><svg viewBox="0 0 44 44"><path d="M20,22 L6,13 Q3,20 6,31 L20,22 Z" fill="#c9364a" stroke="#8c2436" stroke-width="2.2" stroke-linejoin="round"/><path d="M24,22 L38,13 Q41,20 38,31 L24,22 Z" fill="#c9364a" stroke="#8c2436" stroke-width="2.2" stroke-linejoin="round"/><circle cx="22" cy="22" r="4.5" fill="#e0584b" stroke="#8c2436" stroke-width="2.2"/></svg></button>
		<button id="flipBtn" title="翻跟头（拖住时点）"><svg viewBox="0 0 44 44"><path d="M11,29 A12.5,12.5 0 1 1 30,31" fill="none" stroke="#6b4a2b" stroke-width="4" stroke-linecap="round"/><path d="M33,25 L31,36 L23,29 Z" fill="#6b4a2b"/><circle cx="14" cy="35" r="4.5" fill="#7dbbe0" stroke="#4a7da5" stroke-width="2.2"/></svg></button>
		<button id="cutBtn" title="剪刀：点一下剪成两半"><svg viewBox="0 0 44 44"><path d="M10,8 L30,32" stroke="#8a9aa8" stroke-width="3.6" stroke-linecap="round"/><path d="M30,8 L10,32" stroke="#b8c4cc" stroke-width="3.6" stroke-linecap="round"/><circle cx="8" cy="36" r="4.5" fill="none" stroke="#c94f43" stroke-width="3"/><circle cx="32" cy="36" r="4.5" fill="none" stroke="#c94f43" stroke-width="3"/><circle cx="20" cy="20" r="2" fill="#6b4a2b"/></svg></button>
		<button id="paintBtn" title="上色：选个颜色点一点"><svg viewBox="0 0 44 44"><path d="M30,6 L14,26" stroke="#8a5a33" stroke-width="4.2" stroke-linecap="round"/><path d="M14,26 Q8,28 7,35 Q13,36 16,31 Q18,28 14,26 Z" fill="#e8a878" stroke="#b97a4e" stroke-width="2"/><circle cx="33" cy="10" r="4" fill="#e0584b" opacity="0.9"/><circle cx="27" cy="35" r="3" fill="#53a7dd" opacity="0.9"/><circle cx="37" cy="24" r="2.6" fill="#7dbb5f" opacity="0.9"/></svg></button>
		<button id="kneadBtn" title="捏一捏"><svg viewBox="0 0 44 44"><path d="M6,13 Q20,6 31,15" fill="none" stroke="#e8a878" stroke-width="6" stroke-linecap="round"/><path d="M6,32 Q20,38 31,27" fill="none" stroke="#e8a878" stroke-width="6" stroke-linecap="round"/><circle cx="35.5" cy="21" r="5" fill="#c94f43" stroke="#8c3428" stroke-width="2.2"/></svg></button>
		<button id="wsBtn" title="手办工坊：捏一只穿玩偶服的小家伙"><svg viewBox="0 0 44 44"><circle cx="22" cy="15" r="9" fill="#e8b28a" stroke="#a06b43" stroke-width="2.6"/><path d="M13,38 Q13,25 22,25 Q31,25 31,38 Z" fill="#7dbb5f" stroke="#4a7d38" stroke-width="2.6" stroke-linejoin="round"/><circle cx="19" cy="14.5" r="1.6" fill="#2f2620"/><circle cx="25.5" cy="15" r="1.6" fill="#2f2620"/><path d="M14,9 Q17,4 21,7 M30,9 Q27,4 23,7" fill="none" stroke="#4a7d38" stroke-width="3.4" stroke-linecap="round"/></svg></button>
		<button id="demoBtn" title="看表演：游戏当面捏给你看"><svg viewBox="0 0 44 44"><g transform="rotate(-14 12 14)"><rect x="5" y="9" width="30" height="8" rx="2" fill="#3a3430"/><path d="M9,9 l4,8 M16,9 l4,8 M23,9 l4,8 M30,9 l4,8" stroke="#f4eee3" stroke-width="2.4"/></g><rect x="6" y="18" width="30" height="17" rx="3" fill="#3a3430" stroke="#211d1a" stroke-width="1.6"/><path d="M17,22 L27,26.5 L17,31 Z" fill="#f6d155"/></svg></button>
		<button id="clipBtn" title="给作品拍一段环绕短片"><svg viewBox="0 0 44 44"><rect x="5" y="14" width="24" height="17" rx="4.5" fill="#8a9aa8" stroke="#5d6b77" stroke-width="2.4"/><path d="M29,20 L39,15 L39,30 L29,25 Z" fill="#5d6b77"/><circle cx="17" cy="22.5" r="5.5" fill="#dbe4ea" stroke="#5d6b77" stroke-width="2"/><circle cx="9" cy="10" r="3.4" fill="#e0584b"/></svg></button>
		<button id="clearBtn" title="收拾干净（按住）"><svg viewBox="0 0 44 44"><path d="M29,5 L20,22" stroke="#8a5a33" stroke-width="4.2" stroke-linecap="round"/><path d="M20,22 L10,37 M21.5,23.5 L16,38 M23,24 L22,39 M24.5,23.5 L28,37" stroke="#d9a75a" stroke-width="3.4" stroke-linecap="round"/><path d="M17.5,20 L26,24" stroke="#b9822e" stroke-width="3.6" stroke-linecap="round"/></svg></button>
		</div>
	</div>

	<!-- 手办工坊的工具条：进工坊时替换调色盘。R2 内容行随 R3 的 tab 切换 -->
	<div id="workshopBar" class="hidden" data-tab="shape">
		<div class="prow" id="wsChipRow">
			<button id="wsAddPieceBtn" title="再来一块泥"><svg viewBox="0 0 44 44"><path d="M14,24 Q10,15 18,12 Q20,5 28,8 Q36,8 35,17 Q40,23 33,28 Q31,35 22,33 Q13,35 14,24 Z" fill="#e8cfa8" stroke="#b99a6a" stroke-width="2.4"/><path d="M22,16 V28 M16,22 H28" stroke="#8a6a44" stroke-width="3.6" stroke-linecap="round"/></svg></button>
		</div>
		<div class="prow" id="wsColorRow"></div>
		<div class="prow wsrow" id="wsShapeRow">
			<button data-shape="0" title="圆滚滚小人"><svg viewBox="0 0 44 44"><circle cx="22" cy="14" r="8" fill="#e8b28a" stroke="#a06b43" stroke-width="2.4"/><circle cx="22" cy="30" r="10.5" fill="#e8b28a" stroke="#a06b43" stroke-width="2.4"/></svg></button>
			<button data-shape="1" title="高豆子"><svg viewBox="0 0 44 44"><ellipse cx="22" cy="22" rx="8.5" ry="16" fill="#a8c686" stroke="#6d8a4e" stroke-width="2.4"/></svg></button>
			<button data-shape="2" title="鼓肚子"><svg viewBox="0 0 44 44"><circle cx="22" cy="13" r="7.5" fill="#e8b28a" stroke="#a06b43" stroke-width="2.4"/><ellipse cx="22" cy="29" rx="11" ry="10" fill="#e8b28a" stroke="#a06b43" stroke-width="2.4"/><ellipse cx="22" cy="31" rx="6" ry="4.5" fill="#f4d4b5"/></svg></button>
			<button data-shape="3" title="圆球"><svg viewBox="0 0 44 44"><circle cx="22" cy="22" r="13" fill="#7dbbe0" stroke="#4a7da5" stroke-width="2.6"/><circle cx="17" cy="17" r="3.5" fill="#ffffff" opacity="0.6"/></svg></button>
			<button data-shape="4" title="蛋蛋"><svg viewBox="0 0 44 44"><path d="M22,6 Q33,16 33,27 A11,11 0 1 1 11,27 Q11,16 22,6 Z" fill="#f2e0c2" stroke="#c4ad8a" stroke-width="2.6"/></svg></button>
			<button data-shape="5" title="扁饼"><svg viewBox="0 0 44 44"><ellipse cx="22" cy="24" rx="15" ry="8" fill="#f6d155" stroke="#b9982e" stroke-width="2.6"/><ellipse cx="22" cy="21" rx="15" ry="7" fill="#fce38a" stroke="#b9982e" stroke-width="2"/></svg></button>
			<button data-shape="6" title="香肠"><svg viewBox="0 0 44 44"><rect x="6" y="16" width="32" height="13" rx="6.5" fill="#e0937b" stroke="#a55e49" stroke-width="2.6"/></svg></button>
			<button data-shape="7" title="方砖"><svg viewBox="0 0 44 44"><rect x="9" y="12" width="26" height="21" rx="4" fill="#c9856a" stroke="#8f5540" stroke-width="2.6"/><path d="M9,19 h26 M22,12 v7 M15,19 v14 M29,19 v14" stroke="#8f5540" stroke-width="1.8" opacity="0.6"/></svg></button>
			<button data-shape="8" title="圆锥"><svg viewBox="0 0 44 44"><path d="M22,7 L34,33 Q22,39 10,33 Z" fill="#d9a75a" stroke="#a3763a" stroke-width="2.6" stroke-linejoin="round"/></svg></button>
			<button data-shape="9" title="半球"><svg viewBox="0 0 44 44"><path d="M8,29 A14,14 0 0 1 36,29 Z" fill="#8fbfae" stroke="#5d8a7b" stroke-width="2.6" stroke-linejoin="round"/><ellipse cx="22" cy="29" rx="14" ry="3.5" fill="#a8d2c2" stroke="#5d8a7b" stroke-width="2"/></svg></button>
			<button id="wsTallBtn" title="拉高一点"><svg viewBox="0 0 44 44"><ellipse cx="22" cy="26" rx="8" ry="13" fill="#e8b28a" stroke="#a06b43" stroke-width="2.4"/><path d="M22,10 V3 M18,6 L22,2 L26,6" fill="none" stroke="#6b4a2b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
			<button id="wsFlatBtn" title="压扁一点"><svg viewBox="0 0 44 44"><ellipse cx="22" cy="30" rx="13" ry="8" fill="#e8b28a" stroke="#a06b43" stroke-width="2.4"/><path d="M22,10 V17 M18,14 L22,18 L26,14" fill="none" stroke="#6b4a2b" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
		</div>
		<div class="prow wsrow" id="wsSculptRow">
			<button id="wsDentBtn" title="戳坑：点一下戳、划一划刻沟"><svg viewBox="0 0 44 44"><path d="M30,5 L21,20" stroke="#8a5a33" stroke-width="4.6" stroke-linecap="round"/><path d="M21,20 L17,28" stroke="#c98d52" stroke-width="4" stroke-linecap="round"/><path d="M8,33 Q17,26 26,33 Q17,38 8,33 Z" fill="#e8b28a" stroke="#a06b43" stroke-width="2.2"/></svg></button>
			<button id="wsBumpBtn" title="鼓包：点一下鼓个包"><svg viewBox="0 0 44 44"><path d="M6,33 Q13,33 15,28 Q18,20 22,20 Q26,20 29,28 Q31,33 38,33" fill="none" stroke="#a06b43" stroke-width="2.6"/><circle cx="22" cy="24" r="6.5" fill="#e8b28a" stroke="#a06b43" stroke-width="2.2"/></svg></button>
			<button id="wsBrushBtn" title="笔刷大小"><svg viewBox="0 0 44 44"><circle cx="22" cy="23" r="9" fill="#e8a05c" stroke="#b06f33" stroke-width="3"/></svg></button>
			<button id="wsUndoBtn" title="撤销上一笔"><svg viewBox="0 0 44 44"><path d="M30,10 A12,12 0 1 0 34,26" fill="none" stroke="#8a6a44" stroke-width="4.4" stroke-linecap="round"/><path d="M25,5 L31,10.5 L24,15" fill="none" stroke="#8a6a44" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
