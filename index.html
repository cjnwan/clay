<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="utf-8">
	<title>捏黏土</title>
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
	<style>
		/* ============================================================
		   设计 tokens：暖陶土工作台
		   一切颜色向暖棕靠拢；阴影永远是暖的；动效快出缓收
		   ============================================================ */
		:root {
			/* 表面 */
			--clay-bg: #EFE0C8;            /* 场景米色（与 3D 背景一致） */
			--tray-hi: #FDF5E5;            /* 托盘亮面 */
			--tray-lo: #F5E6CB;            /* 托盘暗面 */
			--surface: #FFFCF4;            /* 按钮亮面（无纯白） */
			--surface-lo: #F8EDD9;         /* 按钮暗面 */
			--ink: #6B4A2B;                /* 主墨色 */
			--ink-soft: #8A6A44;           /* 次级墨色 */
			/* 模式三色（颜色即模式，硬约束） */
			--mode-shape: #7DBBE0;
			--mode-sculpt: #E8A05C;
			--mode-deco: #F2A7C4;
			/* 暖阴影（禁冷黑） */
			--shadow-warm: rgba(122, 90, 54, 0.28);
			--shadow-soft: rgba(122, 90, 54, 0.16);
			--edge-warm: rgba(122, 90, 54, 0.10);
			/* 圆角 & 动效 */
			--r-tray: 30px;
			--r-row: 18px;
			--ease-out: cubic-bezier(0.22, 1, 0.36, 1);
			--dur-press: 0.16s;
			--dur-panel: 0.4s;
			/* 触达下限（4 岁胖手指，硬约束 ≥44pt） */
			--tap: 44px;
		}

		* { margin: 0; padding: 0; box-sizing: border-box; }

		html, body { height: 100%; touch-action: none; }

		body {
			overflow: hidden;
			background: var(--clay-bg);
			font-family: ui-rounded, "PingFang SC", "Hiragino Sans GB", system-ui, sans-serif;
			user-select: none;
			-webkit-user-select: none;
			-webkit-touch-callout: none;
			overscroll-behavior: none;
		}

		canvas { display: block; touch-action: none; }

		/* 暖晕影：把视线聚回转盘中心，零成本的空间纵深 */
		#vignette {
			position: fixed;
			inset: 0;
			pointer-events: none;
			z-index: 1;
			background: radial-gradient(120% 90% at 50% 42%, transparent 58%, rgba(122, 90, 54, 0.09) 100%);
		}

		#title {
			position: fixed;
			top: max(14px, env(safe-area-inset-top));
			left: 18px;
			z-index: 3;
			font-size: 26px;
			font-weight: 900;
			color: #8A5A33;
			letter-spacing: 3px;
			transform: rotate(-2.5deg);
			/* 贴纸字：厚白描边垫在填充后面 + 暖色落影 */
			-webkit-text-stroke: 6px rgba(255, 252, 244, 0.95);
			paint-order: stroke fill;
			text-shadow: 0 3px 0 rgba(122, 90, 54, 0.22);
			pointer-events: none;
		}

		#title small {
			display: block;
			font-size: 9px;
			font-weight: 600;
			letter-spacing: 0.5px;
			opacity: 0.38;
			-webkit-text-stroke: 0;
			text-shadow: none;
		}

		/* 提示：一块小告示牌，不再是横跨全屏的文字墙 */
		#hint {
			position: fixed;
			bottom: 150px;
			left: 50%;
			transform: translateX(-50%);
			width: max-content;
			max-width: min(90vw, 520px);
			padding: 8px 16px;
			z-index: 4;
			text-align: center;
			color: var(--ink-soft);
			font-size: 13px;
			line-height: 1.55;
			background: rgba(255, 252, 244, 0.92);
			border: 2px solid rgba(255, 255, 255, 0.9);
			border-radius: 16px 18px 17px 15px;
			box-shadow: 0 3px 12px var(--shadow-soft);
			transform: translateX(-50%) rotate(-0.8deg);
			pointer-events: none;
			transition: opacity 0.3s var(--ease-out);
		}

		#hint:empty { opacity: 0; }

		/* ============================================================
		   工作台托盘：UI 都摆在这块"木案板"上，不再悬浮
		   ============================================================ */
		#palette, #workshopBar {
			position: fixed;
			bottom: 0;
			left: 0;
			right: 0;
			margin: 0 auto;
			width: min(100%, 720px);
			z-index: 5;
			display: flex;
			flex-direction: column;
			gap: 6px;
			align-items: center;
			padding: 10px 8px max(10px, env(safe-area-inset-bottom));
			background:
				linear-gradient(var(--tray-hi), var(--tray-lo));
			border-radius: 18px 14px 0 0;
			box-shadow:
				0 -10px 32px var(--shadow-soft),
				inset 0 2px 0 rgba(255, 255, 255, 0.75),
				inset 0 -12px 24px rgba(122, 90, 54, 0.05);
			transition: transform var(--dur-panel) var(--ease-out), opacity var(--dur-panel) var(--ease-out), visibility var(--dur-panel);
		}

		/* 云朵边：托盘上沿一排软凸起，"案板"变"棉花糖架" */
		#palette::before, #workshopBar::before {
			content: "";
			position: absolute;
			top: -11px;
			left: 10px;
			right: 10px;
			height: 12px;
			background: radial-gradient(circle at 14px 12px, var(--tray-hi) 11px, transparent 11.8px);
			background-size: 34px 12px;
			background-repeat: repeat-x;
			pointer-events: none;
		}

		/* 板⇄工坊转场：托盘沉下去再浮上来，跟相机飞行同拍 */
		#palette.hidden, #workshopBar.hidden {
			transform: translateY(110%);
			opacity: 0;
			visibility: hidden;
			pointer-events: none;
		}

		/* 行：单排横滑（溢出时），两端 margin:auto 实现"能居中就居中" */
		.prow {
			display: flex;
			flex-wrap: nowrap;
			justify-content: flex-start;
			gap: clamp(6px, 1.2vw, 10px);
			max-width: 100%;
			overflow-x: auto;
			padding: 3px 6px;
			-webkit-overflow-scrolling: touch;
			scrollbar-width: none;
		}

		.prow::-webkit-scrollbar { display: none; }

		.prow > :first-child { margin-left: auto; }

		.prow > :last-child { margin-right: auto; }

		.prow button { flex: 0 0 auto; }

		/* 按钮：从黏土里捏出来的暖白圆钮（≥44pt 触达） */
		#palette button, #workshopBar button {
			width: clamp(var(--tap), 11vw, 56px);
			height: auto;
			aspect-ratio: 1 / 1;
			border-radius: 50%;
			border: 3px solid rgba(255, 253, 247, 0.95);
			background: linear-gradient(var(--surface), var(--surface-lo));
			box-shadow:
				0 3px 10px var(--shadow-warm),
				inset 0 -5px 8px rgba(122, 90, 54, 0.12);
			font-size: clamp(18px, 4.5vw, 26px);
			line-height: 1;
			cursor: pointer;
			touch-action: none;
			transform: rotate(var(--rot, 0deg));
			transition: transform var(--dur-press) var(--ease-out), box-shadow var(--dur-press) var(--ease-out);
		}

		#colorRow button, #wsColorRow button {
			width: clamp(var(--tap), 10.5vw, 50px);
			box-shadow:
				0 3px 9px var(--shadow-warm),
				inset 0 -6px 8px rgba(122, 90, 54, 0.2),
				inset 0 0 0 1.5px rgba(122, 90, 54, 0.1);
		}

		#palette button svg, #workshopBar button svg {
			width: 78%;
			height: 78%;
			display: block;
			margin: auto;
			pointer-events: none;
			filter: drop-shadow(0 1.5px 0 rgba(122, 90, 54, 0.3));
		}

		#palette button.selected, #workshopBar button.selected {
			transform: rotate(var(--rot, 0deg)) scale(1.18);
			box-shadow:
				0 6px 16px var(--shadow-warm),
				0 0 0 4px rgba(255, 253, 247, 0.95),
				0 0 0 6px rgba(122, 90, 54, 0.15),
				inset 0 -5px 8px rgba(122, 90, 54, 0.12);
		}

		#palette button:active, #workshopBar button:active {
			transform: rotate(var(--rot, 0deg)) scale(0.92) translateY(1px);
			box-shadow:
				0 1px 4px var(--shadow-warm),
				inset 0 -3px 6px rgba(122, 90, 54, 0.14);
		}

		#clearBtn.holding { animation: holdfill 0.7s linear forwards; }

		#demoBtn.armed { animation: armedpulse 0.6s ease-in-out infinite alternate; }

		@keyframes armedpulse {
			to { transform: scale(1.2); box-shadow: 0 0 0 5px rgba(246, 209, 85, 0.85), 0 6px 14px var(--shadow-warm); }
		}

		@keyframes holdfill {
			to { transform: scale(1.26); background: #F6D155; box-shadow: 0 0 0 6px rgba(255, 253, 247, 0.85), 0 6px 14px var(--shadow-warm); }
		}

		/* ============================================================
		   工坊：R2 内容行随 tab 换色（颜色即模式，浓度拉到一眼可辨）
		   ============================================================ */
		#workshopBar .wsrow { display: none; border-radius: var(--r-row); padding: 4px 10px; }

		#workshopBar[data-tab="shape"] #wsShapeRow { display: flex; background: color-mix(in srgb, var(--mode-shape) 30%, transparent); animation: rowin 0.3s var(--ease-out); }

		#workshopBar[data-tab="sculpt"] #wsSculptRow { display: flex; background: color-mix(in srgb, var(--mode-sculpt) 32%, transparent); animation: rowin 0.3s var(--ease-out); }

		#workshopBar[data-tab="deco"] #wsPartRow { display: flex; background: color-mix(in srgb, var(--mode-deco) 34%, transparent); animation: rowin 0.3s var(--ease-out); }

		/* tab 切换：新工具行轻轻浮上来（只动 transform/opacity，合成器友好） */
		@keyframes rowin {
			from { opacity: 0; transform: translateY(10px); }
		}

		/* 托盘顶缘同步染一道模式色光 */
		#workshopBar[data-tab="shape"] { box-shadow: 0 -10px 32px var(--shadow-soft), inset 0 3px 0 color-mix(in srgb, var(--mode-shape) 55%, white), inset 0 -12px 24px rgba(122, 90, 54, 0.05); }

		#workshopBar[data-tab="sculpt"] { box-shadow: 0 -10px 32px var(--shadow-soft), inset 0 3px 0 color-mix(in srgb, var(--mode-sculpt) 55%, white), inset 0 -12px 24px rgba(122, 90, 54, 0.05); }

		#workshopBar[data-tab="deco"] { box-shadow: 0 -10px 32px var(--shadow-soft), inset 0 3px 0 color-mix(in srgb, var(--mode-deco) 55%, white), inset 0 -12px 24px rgba(122, 90, 54, 0.05); }

		#workshopBar[data-tab="sculpt"] #wsColorRow { opacity: 0.45; }

		/* R0 块架：一条浅浅的木槽，块们睡在里面 */
		#wsChipRow {
			background: rgba(122, 90, 54, 0.07);
			border-radius: 999px;
			padding: 5px 10px;
			min-height: 54px;
		}

		#wsChipRow button.chip {
			background-color: var(--surface);
			background-size: cover;
			background-position: center;
			animation: chipin 0.3s var(--ease-out);
		}

		@keyframes chipin {
			from { transform: rotate(var(--rot, 0deg)) scale(0.2); opacity: 0; }
		}

		#wsChipRow button.holding { animation: holdfill 0.7s linear forwards; }

		/* 分段 tab：当前模式 = 实色胶囊，隔屏都认得出 */
		#wsTabs {
			display: flex;
			background: linear-gradient(var(--surface), var(--surface-lo));
			border-radius: 999px;
			padding: 4px;
			box-shadow: 0 3px 10px var(--shadow-warm), inset 0 -4px 6px rgba(122, 90, 54, 0.08);
			gap: 2px;
		}

		#workshopBar #wsTabs button {
			border: none;
			border-radius: 999px;
			background: transparent;
			box-shadow: none;
			transform: none;
			width: clamp(var(--tap), 11vw, 54px);
			transition: background var(--dur-press) var(--ease-out), transform var(--dur-press) var(--ease-out);
		}

		#workshopBar #wsTabs button.selected { transform: scale(1.04); }

		#workshopBar[data-tab="shape"] #wsTabs button[data-tab="shape"] { background: var(--mode-shape); box-shadow: inset 0 2px 3px rgba(58, 92, 120, 0.35), 0 1px 0 rgba(255,255,255,0.5); }

		#workshopBar[data-tab="sculpt"] #wsTabs button[data-tab="sculpt"] { background: var(--mode-sculpt); box-shadow: inset 0 2px 3px rgba(140, 84, 30, 0.35), 0 1px 0 rgba(255,255,255,0.5); }

		#workshopBar[data-tab="deco"] #wsTabs button[data-tab="deco"] { background: var(--mode-deco); box-shadow: inset 0 2px 3px rgba(150, 80, 110, 0.35), 0 1px 0 rgba(255,255,255,0.5); }

		/* ✓ 完成：全场唯一的实色主按钮 */
		#wsDoneBtn {
			background: linear-gradient(#A9D68C, #7DBB5F) !important;
			border-color: rgba(255, 253, 247, 0.95) !important;
			box-shadow: 0 4px 12px rgba(93, 138, 62, 0.4), inset 0 -5px 8px rgba(74, 125, 56, 0.3) !important;
		}

		#wsDoneBtn:active { box-shadow: 0 1px 4px rgba(93, 138, 62, 0.4), inset 0 -3px 6px rgba(74, 125, 56, 0.3) !important; }

		#palette.shake, #workshopBar.shake { animation: shake 0.3s; }

		@keyframes shake {
			25% { transform: translateX(-5px); }
			75% { transform: translateX(5px); }
		}

		/* 贴件确认气泡：✓ 贴好 / ↺ 放回 */
		#confirmBar {
			position: fixed;
			display: flex;
			gap: 14px;
			transform: translateX(-50%);
			z-index: 6;
		}

		#confirmBar.hidden { display: none; }

		#confirmBar button {
			width: 56px;
			height: 56px;
			border-radius: 50%;
			border: 3px solid rgba(255, 253, 247, 0.95);
			background: linear-gradient(var(--surface), var(--surface-lo));
			box-shadow: 0 4px 12px var(--shadow-warm), inset 0 -6px 8px rgba(122, 90, 54, 0.12);
			cursor: pointer;
			touch-action: none;
		}

		#confirmBar button svg {
			width: 78%;
			height: 78%;
			display: block;
			margin: auto;
			pointer-events: none;
		}

		#confirmYes { animation: confirmpulse 0.7s ease-in-out infinite alternate; }

		@keyframes confirmpulse {
			to { transform: scale(1.12); box-shadow: 0 0 0 5px rgba(168, 207, 148, 0.75), 0 6px 14px var(--shadow-warm); }
		}

		#loading {
			position: fixed;
			inset: 0;
			display: flex;
			align-items: center;
			justify-content: center;
			background: var(--clay-bg);
			color: #7A5A36;
			font-size: 21px;
			font-weight: 600;
			letter-spacing: 2px;
			z-index: 10;
			transition: opacity 0.5s;
		}

		#loading::before {
			content: "";
			width: 18px;
			height: 18px;
			margin-right: 12px;
			border-radius: 46% 54% 52% 48% / 52% 44% 56% 48%;
			background: #E0584B;
			animation: knead 0.9s var(--ease-out) infinite alternate;
		}

		@keyframes knead {
			to { transform: scale(1.35) rotate(28deg); border-radius: 54% 46% 48% 52% / 44% 56% 44% 56%; background: #F2A34D; }
		}

		#loading.hidden { opacity: 0; pointer-events: none; }

		/* 尊重系统"减弱动态效果"：装饰性动画全部让位 */
		@media (prefers-reduced-motion: reduce) {
			*, *::before, *::after {
				animation-duration: 0.01ms !important;
				animation-iteration-count: 1 !important;
				transition-duration: 0.01ms !important;
			}
		}

		/* 提示条位置：托盘高度不同，板 / 工坊各自上浮；久不变化自动淡出还给画面 */
		body.ws #hint { bottom: 268px; }

		#hint.faded { opacity: 0.18; }

		@media (max-height: 700px) {
			#hint { bottom: 142px; }
			body.ws #hint { bottom: 256px; }
		}
	</style>
</head>
<body>

	<div id="vignette"></div>

	<div id="loading">🥣 和泥中…</div>

	<div id="title">捏黏土<small>three.js + box3d.js</small></div>
	<div id="hint">点颜色加黏土 · 拖一拖、黏一黏 · 🧸 去工坊捏手办 · 🎬 看表演学捏法 · 网址就是分享链接</div>

	<div id="palette">
		<div class="prow" id="colorRow"></div>
		<div class="prow" id="toolRow">
		<button id="sizeBtn" title="大小"><svg viewBox="0 0 44 44"><circle cx="22" cy="23" r="10" fill="#b98a5a" stroke="#6b4a2b" stroke-width="3"/><circle cx="18.5" cy="19" r="2.6" fill="#e8cfa8" opacity="0.85"/></svg></button>
		<button id="chainBtn" title="软软小蛇"><svg viewBox="0 0 44 44"><path d="M6,29 C11,17 17,17 21,25 C25,33 30,33 35,25" fill="none" stroke="#5e9a48" stroke-width="7" stroke-linecap="round"/><circle cx="35" cy="23" r="5.5" fill="#6fb055" stroke="#4a7d38" stroke-width="2"/><circle cx="37" cy="21.5" r="1.5" fill="#2f2620"/><path d="M40,25 l4,2 m-4,-1 l3,3" stroke="#c94f43" stroke-width="1.8" stroke-linecap="round"/></svg></button>
		<button id="eyeBtn" title="眼睛"><svg viewBox="0 0 44 44"><circle cx="22" cy="22" r="13" fill="#ffffff" stroke="#6b4a2b" stroke-width="3"/><circle cx="25.5" cy="24" r="5.5" fill="#2f2620"/><circle cx="23.5" cy="21.5" r="1.8" fill="#ffffff"/></svg></button>
		<button id="mouthBtn" title="嘴巴"><svg viewBox="0 0 44 44"><path d="M8,18 Q22,38 36,18 Q29,25 22,25 Q15,25 8,18 Z" fill="#c94f43" stroke="#8c3428" stroke-width="2.6" stroke-linejoin="round"/><path d="M15,26.5 Q22,31 29,26.5" fill="none" stroke="#8c3428" stroke-width="2" stroke-linecap="round"/></svg></button>
		<button id="hatBtn" title="帽子"><svg viewBox="0 0 44 44"><path d="M22,7 Q26,16 32,29 L12,29 Q18,16 22,7 Z" fill="#e0584b" stroke="#a53d33" stroke-width="2.6" stroke-linejoin="round"/><ellipse cx="22" cy="30" rx="14" ry="4.5" fill="#f0b64e" stroke="#b9822e" stroke-width="2.4"/><circle cx="22" cy="7" r="4" fill="#f0b64e" stroke="#b9822e" stroke-width="2.2"/></svg></button>
		<button id="bowBtn" title="蝴蝶结"><svg viewBox="0 0 44 44"><path d="M20,22 L6,13 Q3,20 6,31 L20,22 Z" fill="#c9364a" stroke="#8c2436" stroke-width="2.2" stroke-linejoin="round"/><path d="M24,22 L38,13 Q41,20 38,31 L24,22 Z" fill="#c9364a" stroke="#8c2436" stroke-width="2.2" stroke-linejoin="round"/><circle cx="22" cy="22" r="4.5" fill="#e0584b" stroke="#8c2436" stroke-width="2.2"/></svg></button>
		<button id="flipBtn" title="翻跟头（拖住时点）"><svg viewBox="0 0 44 44"><path d="M11,29 A12.5,12.5 0 1 1 30,31" fill="none" stroke="#6b4a2b" stroke-width="4" stroke-linecap="round"/><path d="M33,25 L31,36 L23,29 Z" fill="#6b4a2b"/><circle cx="14" cy="35" r="4.5" fill="#7dbbe0" stroke="#4a7da5" stroke-width="2.2"/></svg></button>
		<button id="cutBtn" title="剪刀：点一下剪成两半"><svg viewBox="0 0 44 44"><path d="M10,8 L30,32" stroke="#8a9aa8" stroke-width="3.6" stroke-linecap="round"/><path d="M30,8 L10,32" stroke="#b8c4cc" stroke-width="3.6" stroke-linecap="round"/><circle cx="8" cy="36" r="4.5" fill="none" stroke="#c94f43" stroke-width="3"/><circle cx="32" cy="36" r="4.5" fill="none" stroke="#c94f43" stroke-width="3"/><circle cx="20" cy="20" r="2" fill="#6b4a2b"/></svg></button>
